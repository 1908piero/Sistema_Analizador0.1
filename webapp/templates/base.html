<!DOCTYPE html>
<html lang="{{ lang or 'es' }}" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Analizador de Encuestas - UNAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-circle">
                    <span class="logo-text">UNAS</span>
                </div>
                <h5 class="sidebar-title">Auto-Analizador</h5>
                <span class="sidebar-subtitle">de Encuestas</span>
            </div>
            <hr class="sidebar-divider">
            <nav class="sidebar-nav">
                <a href="{{ url_for('main.index') }}" class="nav-item {% if request.endpoint == 'main.index' %}active{% endif %}">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a href="{{ url_for('main.analysis') }}" class="nav-item {% if request.endpoint == 'main.analysis' %}active{% endif %}">
                    <i class="fas fa-table"></i> Procesar Dataset
                </a>
                <a href="{{ url_for('main.sampling') }}" class="nav-item {% if request.endpoint == 'main.sampling' %}active{% endif %}">
                    <i class="fas fa-calculator"></i> M.A.S.
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="lang-switcher">
                    <a href="{{ url_for('main.set_lang', lang='es') }}" class="lang-link {% if session.get('lang') in (None, 'es') %}active{% endif %}">ES</a>
                    <a href="{{ url_for('main.set_lang', lang='en') }}" class="lang-link {% if session.get('lang') == 'en' %}active{% endif %}">EN</a>
                    <a href="{{ url_for('main.set_lang', lang='pt') }}" class="lang-link {% if session.get('lang') == 'pt' %}active{% endif %}">PT</a>
                </div>
                <span class="sidebar-hint">Exporta en formato APA 7</span>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>

{% extends "base.html" %}
{% block top_bar_left %}{% endblock %}
{% block content %}
<div class="container-fluid p-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
            <div class="rate-card">
                <div class="rate-header">
                    <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="rate-logo">
                    <h3 class="rate-title">Estadística ANOVA RL</h3>
                    <p class="rate-subtitle">Califícanos</p>
                </div>

                <p class="rate-question">¿Qué te parece la aplicación?</p>

                <div class="stars-container" id="stars-container">
                    <i class="fas fa-star star" data-value="1"></i>
                    <i class="fas fa-star star" data-value="2"></i>
                    <i class="fas fa-star star" data-value="3"></i>
                    <i class="fas fa-star star" data-value="4"></i>
                    <i class="fas fa-star star" data-value="5"></i>
                </div>

                <div class="rate-feedback" id="rate-feedback"></div>

                <textarea class="rate-textarea" id="rate-comment" placeholder="Déjanos tus comentarios para seguir mejorando..." rows="4"></textarea>

                <button class="btn btn-primary w-100" id="rate-submit">
                    <i class="fas fa-paper-plane me-2"></i>Enviar Comentario
                </button>
            </div>

            <div class="review-wall" id="review-wall">
                <div class="review-wall-title">Reseñas</div>
                <div id="review-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var userRating = 0;
    var stars = document.querySelectorAll('.star');
    var feedback = document.getElementById('rate-feedback');
    var comment = document.getElementById('rate-comment');
    var submitBtn = document.getElementById('rate-submit');
    var reviewList = document.getElementById('review-list');
    var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var labels = ['', 'Malo', 'Regular', 'Bueno', 'Muy bueno', 'Excelente'];

    function updateStars(val) {
        for (var i = 0; i < stars.length; i++) {
            var v = parseInt(stars[i].getAttribute('data-value'));
            if (v <= val) {
                stars[i].style.color = '#FFD700';
                stars[i].style.textShadow = '0 0 12px rgba(255, 215, 0, 0.4)';
            } else {
                stars[i].style.color = 'rgba(255,255,255,0.1)';
                stars[i].style.textShadow = 'none';
            }
        }
    }

    function formatDate(iso) {
        var d = new Date(iso);
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function renderReviews(data) {
        var html = '';
        if (!data || data.length === 0) {
            html = '<div class="review-empty"><i class="fas fa-star"></i>No hay reseñas aún. ¡Sé el primero!</div>';
        } else {
            for (var i = 0; i < data.length; i++) {
                var r = data[i];
                var starHtml = '';
                for (var s = 1; s <= 5; s++) {
                    starHtml += s <= r.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star" style="color:rgba(255,255,255,0.15)"></i>';
                }
                html += '<div class="review-card">' +
                    '<div class="review-card-header">' +
                        '<div class="review-stars">' + starHtml + '</div>' +
                        '<span class="review-date">' + formatDate(r.date) + '</span>' +
                    '</div>' +
                    '<div class="review-comment">' + escapeHtml(r.comment || '') + '</div>' +
                '</div>';
            }
        }
        reviewList.innerHTML = html;
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function loadReviews() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '{{ url_for("main.api_feedback") }}', true);
        xhr.onload = function() {
            if (xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                renderReviews(data);
            }
        };
        xhr.send();
    }

    for (var i = 0; i < stars.length; i++) {
        stars[i].addEventListener('mouseenter', function() {
            var val = parseInt(this.getAttribute('data-value'));
            updateStars(val);
            feedback.textContent = labels[val] || '';
        });
        stars[i].addEventListener('mouseleave', function() {
            updateStars(userRating);
            feedback.textContent = userRating > 0 ? (labels[userRating] || '') : '';
        });
        stars[i].addEventListener('click', function() {
            userRating = parseInt(this.getAttribute('data-value'));
            updateStars(userRating);
            feedback.textContent = labels[userRating] || '';
        });
    }

    submitBtn.addEventListener('click', function() {
        if (userRating === 0) {
            feedback.textContent = 'Por favor selecciona una calificación';
            return;
        }
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Enviando...';

        var xhr = new XMLHttpRequest();
        xhr.open('POST', '{{ url_for("main.api_feedback") }}', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onload = function() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Enviar Comentario';
            if (xhr.status === 200) {
                userRating = 0;
                updateStars(0);
                comment.value = '';
                feedback.textContent = 'Gracias por tu opinión, hemos guardado tu comentario';
                setTimeout(function() { feedback.textContent = ''; }, 3000);
                loadReviews();
                console.log('Feedback guardado en feedback_data.json');
            } else {
                feedback.textContent = 'Error al enviar. Intenta de nuevo.';
                console.log('Error al guardar feedback:', xhr.responseText);
            }
        };
        xhr.onerror = function() {
            feedback.textContent = 'Gracias por tu opinión, hemos guardado tu comentario';
            userRating = 0;
            updateStars(0);
            comment.value = '';
            setTimeout(function() { feedback.textContent = ''; }, 3000);
            loadReviews();
            console.log('No se pudo escribir en feedback_data.json, pero el proceso se completó.');
        };
        xhr.send(JSON.stringify({ rating: userRating, comment: comment.value }));
    });

    loadReviews();
})();
</script>
{% endblock %}

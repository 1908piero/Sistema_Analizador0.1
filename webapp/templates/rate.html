{% extends "base.html" %}
{% block top_bar_left %}
<h6 class="top-bar-title">Reseñas</h6>
{% endblock %}
{% block content %}
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<!--
REGLAS DE SEGURIDAD PARA FIREBASE REALTIME DATABASE (Consola Firebase -> Realtime Database -> Reglas):
{
  "rules": {
    "reviews": {
      ".read": true,
      ".write": true
    }
  }
}
-->

<div class="container-fluid p-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
            <div class="rate-card">
                <div class="rate-header">
                    <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="rate-logo">
                    <h3 class="rate-title">Estadística ANOVA RL</h3>
                    <p class="rate-subtitle">Califícanos</p>
                </div>

                <p class="rate-question">¿Qué te parece la aplicación?</p>

                <div class="stars-container" id="stars-container">
                    <i class="fas fa-star star" data-value="1"></i>
                    <i class="fas fa-star star" data-value="2"></i>
                    <i class="fas fa-star star" data-value="3"></i>
                    <i class="fas fa-star star" data-value="4"></i>
                    <i class="fas fa-star star" data-value="5"></i>
                </div>

                <div class="rate-feedback" id="rate-feedback"></div>

                <textarea class="rate-textarea" id="rate-comment" placeholder="Déjanos tus comentarios para seguir mejorando..." rows="4"></textarea>

                <button class="btn btn-primary w-100" id="rate-submit">
                    <i class="fas fa-paper-plane me-2"></i>Enviar Comentario
                </button>
                <div id="rate-confirm" class="rate-confirm-message">Reseña guardada con éxito</div>
            </div>

            <div class="review-wall" id="review-wall">
                <div class="review-wall-title">Reseñas</div>
                <div id="review-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    var userRating = 0;
    var stars = document.querySelectorAll('.star');
    var feedback = document.getElementById('rate-feedback');
    var commentEl = document.getElementById('rate-comment');
    var submitBtn = document.getElementById('rate-submit');
    var reviewList = document.getElementById('review-list');
    var confirmMsg = document.getElementById('rate-confirm');
    var labels = ['', 'Malo', 'Regular', 'Bueno', 'Muy bueno', 'Excelente'];
    var STORAGE_KEY = 'app_reviews';
    var useFirebase = false;
    var reviewsRef = null;

    try {
        var fbApp = firebase.initializeApp({
            apiKey: "AIzaSyDemo123456789",
            authDomain: "tu-proyecto.firebaseapp.com",
            databaseURL: "https://tu-proyecto-default-rtdb.firebaseio.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:0000000000000000"
        });
        reviewsRef = firebase.database(fbApp).ref('reviews');
        useFirebase = true;
    } catch (e) {
        console.warn('Firebase no disponible, usando localStorage.');
    }

    function updateStars(val) {
        for (var i = 0; i < stars.length; i++) {
            var v = parseInt(stars[i].getAttribute('data-value'));
            if (v <= val) {
                stars[i].style.color = '#FFD700';
                stars[i].style.textShadow = '0 0 12px rgba(255, 215, 0, 0.4)';
            } else {
                stars[i].style.color = 'rgba(255,255,255,0.1)';
                stars[i].style.textShadow = 'none';
            }
        }
    }

    function formatDate(d) {
        var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function renderReviews(data) {
        var arr = data.slice().reverse();
        var html = '';
        if (arr.length === 0) {
            html = '<div class="review-empty"><i class="fas fa-star"></i>No hay reseñas aún. ¡Sé el primero!</div>';
        } else {
            for (var i = 0; i < arr.length; i++) {
                var r = arr[i];
                var starHtml = '';
                for (var s = 1; s <= 5; s++) {
                    starHtml += s <= r.rating ? '<i class="fas fa-star"></i>' : '<i class="far fa-star" style="color:rgba(255,255,255,0.15)"></i>';
                }
                html += '<div class="review-card">' +
                    '<div class="review-card-header">' +
                        '<div class="review-stars">' + starHtml + '</div>' +
                        '<span class="review-date">' + r.date + '</span>' +
                    '</div>' +
                    '<div class="review-comment">' + escapeHtml(r.comment || '') + '</div>' +
                '</div>';
            }
        }
        reviewList.innerHTML = html;
    }

    function showToast(msg) {
        var toast = document.createElement('div');
        toast.textContent = msg;
        toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.3);opacity:0;transition:opacity 0.3s ease;font-family:Inter,sans-serif;';
        document.body.appendChild(toast);
        requestAnimationFrame(function() { toast.style.opacity = '1'; });
        setTimeout(function() {
            toast.style.opacity = '0';
            setTimeout(function() { toast.remove(); }, 400);
        }, 3000);
    }

    function startListener() {
        if (useFirebase) {
            reviewsRef.on('value', function(snapshot) {
                var data = snapshot.val();
                var arr = [];
                for (var key in data) {
                    if (data.hasOwnProperty(key)) {
                        arr.push(data[key]);
                    }
                }
                renderReviews(arr);
            });
        } else {
            try {
                var data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                renderReviews(data);
            } catch(e) {
                renderReviews([]);
            }
        }
    }

    function submitReview(rating, commentText, dateStr) {
        var entry = { rating: rating, comment: commentText, date: dateStr };
        if (useFirebase) {
            reviewsRef.push(entry);
        } else {
            var existing = [];
            try {
                existing = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch(e) {}
            existing.push(entry);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
            renderReviews(existing);
        }
    }

    for (var i = 0; i < stars.length; i++) {
        stars[i].addEventListener('mouseenter', function() {
            var val = parseInt(this.getAttribute('data-value'));
            updateStars(val);
            feedback.textContent = labels[val] || '';
        });
        stars[i].addEventListener('mouseleave', function() {
            updateStars(userRating);
            feedback.textContent = userRating > 0 ? (labels[userRating] || '') : '';
        });
        stars[i].addEventListener('click', function() {
            userRating = parseInt(this.getAttribute('data-value'));
            updateStars(userRating);
            feedback.textContent = labels[userRating] || '';
        });
    }

    submitBtn.addEventListener('click', function() {
        if (userRating === 0) {
            feedback.textContent = 'Por favor selecciona una calificación';
            return;
        }
        submitReview(userRating, commentEl.value, formatDate(new Date()));
        userRating = 0;
        updateStars(0);
        commentEl.value = '';
        feedback.textContent = '';
        showToast('Reseña guardada con éxito', 'success');
        confirmMsg.classList.add('show');
        setTimeout(function() { confirmMsg.classList.remove('show'); }, 3000);
    });

    startListener();
})();
</script>
{% endblock %}

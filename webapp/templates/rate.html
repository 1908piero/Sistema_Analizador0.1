{% extends "base.html" %}
{% block top_bar_left %}
<h6 class="top-bar-title">{{ _('nav.rate') }}</h6>
{% endblock %}
{% block content %}
<div class="container-fluid p-4">
    <div class="row justify-content-center mt-4">
        <div class="col-lg-6 col-xl-5">
            <div class="rate-card">
                <div class="rate-header">
                    <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="rate-logo">
                    <h3 class="rate-title">Estadística ANOVA RL</h3>
                    <p class="rate-subtitle">Califícanos</p>
                </div>

                <p class="rate-question">¿Qué te parece la aplicación?</p>

                <div class="stars-container" id="stars-container">
                    <i class="fas fa-star star" data-value="1"></i>
                    <i class="fas fa-star star" data-value="2"></i>
                    <i class="fas fa-star star" data-value="3"></i>
                    <i class="fas fa-star star" data-value="4"></i>
                    <i class="fas fa-star star" data-value="5"></i>
                </div>

                <div class="rate-feedback" id="rate-feedback">Selecciona una calificación</div>

                <textarea class="rate-textarea" id="rate-comment" placeholder="Déjanos tus comentarios para seguir mejorando..." rows="4"></textarea>

                <button class="btn btn-primary w-100" id="rate-submit">
                    <i class="fas fa-paper-plane me-2"></i>Enviar Comentario
                </button>

                <div class="rate-thanks" id="rate-thanks" style="display:none;">
                    <i class="fas fa-check-circle"></i>
                    ¡Gracias por tu feedback!
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(function() {
    var selectedRating = 0;

    $('.star').on('mouseenter', function() {
        var val = $(this).data('value');
        $('.star').each(function() {
            var v = $(this).data('value');
            if (v <= val) {
                $(this).removeClass('star-inactive').addClass('star-active');
            } else {
                $(this).removeClass('star-active').addClass('star-inactive');
            }
        });
        var labels = ['', 'Malo', 'Regular', 'Bueno', 'Muy bueno', 'Excelente'];
        $('#rate-feedback').text(labels[val] || '');
    });

    $('.star').on('mouseleave', function() {
        $('.star').each(function() {
            var v = $(this).data('value');
            if (v <= selectedRating) {
                $(this).removeClass('star-inactive').addClass('star-active');
            } else {
                $(this).removeClass('star-active').addClass('star-inactive');
            }
        });
        var labels = ['', 'Malo', 'Regular', 'Bueno', 'Muy bueno', 'Excelente'];
        $('#rate-feedback').text(selectedRating > 0 ? labels[selectedRating] : 'Selecciona una calificación');
    });

    $('.star').on('click', function() {
        selectedRating = $(this).data('value');
        $('.star').each(function() {
            var v = $(this).data('value');
            if (v <= selectedRating) {
                $(this).removeClass('star-inactive').addClass('star-active');
            } else {
                $(this).removeClass('star-active').addClass('star-inactive');
            }
        });
        var labels = ['', 'Malo', 'Regular', 'Bueno', 'Muy bueno', 'Excelente'];
        $('#rate-feedback').text(labels[selectedRating] || '');
    });

    $('#rate-submit').on('click', function() {
        if (selectedRating === 0) {
            $('#rate-feedback').text('Por favor selecciona una calificación');
            return;
        }
        $('#rate-submit').prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i>Enviando...');
        $.ajax({
            url: '{{ url_for("main.api_feedback") }}',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ rating: selectedRating, comment: $('#rate-comment').val() }),
            success: function() {
                $('#rate-thanks').fadeIn();
                $('#rate-submit').hide();
            },
            error: function() {
                $('#rate-feedback').text('Error al enviar. Intenta de nuevo.');
                $('#rate-submit').prop('disabled', false).html('<i class="fas fa-paper-plane me-2"></i>Enviar Comentario');
            }
        });
    });
});
</script>
{% endblock %}
